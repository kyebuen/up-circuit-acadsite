<!-- This is named index.html as it serves as the "first page" website visitors will see. Some code weirdness will happen if this is named differently. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP Circuit - Academic Practice Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-layout">
    
    <div class="page-wrapper">
        <img src="logo.png" alt="UP Circuit Logo" class="main-logo">

        <div class="login-header">
            <h2>UP Circuit Academic Website</h2>
        </div>

        <div class="login-container">
            <form id="login-form">
                <div class="input-group">
                    <label for="username">USERNAME</label>
                    <input type="text" id="username" placeholder="20xxxxxxx" required>
                </div>

                <div class="input-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" placeholder="••••••" required>
                </div>

                <button type="submit" class="login-btn">Log In</button>
            </form>
            
            <div id="error-message" class="error"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
