<div class="topic-container" style="font-family: sans-serif; color: #e2e8f0; max-width: 800px; margin: 0 auto; line-height: 1.6;">
    
    <div class="topic-content">
        <div class="formula-row" style="display: flex; gap: 20px; justify-content: center; margin-bottom: 20px;">
            <div class="math-box">$$ v = iR $$</div>
            <div class="math-box">$$ G = \frac{1}{R} = \frac{i}{v} $$</div>
        </div>

        <div style="background-color: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: 30px auto; display: block; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
            <object 
                type="image/svg+xml" 
                data="1a/q1/circuit.svg" 
                style="width: 100%; height: auto; display: block;"
            >
                <p style="color: black; text-align: center; margin: 0;">Circuit diagram could not be loaded.</p>
            </object>
        </div>

        <h2 style="color: #00b4d8; margin-top: 40px; border-bottom: 1px solid #334155; padding-bottom: 5px;">Knowledge Check</h2>
        
        <div class="problem-area" style="background-color: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #00b4d8;">
            <p style="margin-top: 0; color: #f8fafc; font-weight: bold;">Use the circuit diagram above to determine the following electrical properties:</p>
            
            <div class="input-row" style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                <span style="min-width: 30px; font-weight: bold;">v =</span> 
                <input type="text" class="input-box" oninput="check_tol(this, 30)" style="padding: 6px; border-radius: 4px; border: 1px solid #475569; background-color: #0f172a; color: #fff; width: 80px; text-align: center;"> 
                <span>V</span>
            </div>
            
            <div class="input-row" style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                <span style="min-width: 30px; font-weight: bold;">i =</span> 
                <input type="text" class="input-box" oninput="check_tol(this, 6)" style="padding: 6px; border-radius: 4px; border: 1px solid #475569; background-color: #0f172a; color: #fff; width: 80px; text-align: center;"> 
                <span>mA</span>
            </div>
            
            <div class="input-row" style="margin-bottom: 5px; display: flex; align-items: center; gap: 10px;">
                <span style="min-width: 30px; font-weight: bold;">p =</span> 
                <input type="text" class="input-box" oninput="check_tol(this, 180)" style="padding: 6px; border-radius: 4px; border: 1px solid #475569; background-color: #0f172a; color: #fff; width: 80px; text-align: center;"> 
                <span>mW absorbed</span>
            </div>
        </div>
    </div>

</div>
